server.port=8086

spring.application.name=quizmaster-analytics-service

# # ===========================
# # Database
# # ===========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quiz_analytics_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}

# # ===========================
# # Eureka
# # ===========================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# # ===========================
# # Kafka — consumes only quiz.attempt.graded (AttemptGradedEvent)
# # ===========================
# Master switch — set KAFKA_ENABLED=false (env) to run without a broker (listener won't start).
app.kafka.enabled=${KAFKA_ENABLED:true}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.consumer.group-id=analytics-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.quizmaster.analytics.event.AttemptGradedEvent
